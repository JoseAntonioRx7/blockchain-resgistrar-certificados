<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Validar Certificado</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        input { display: block; width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background-color: #e0e0e0; border: 1px solid #999; }
        .result { margin-top: 15px; padding: 10px; background: #f9f9f9; word-break: break-all; min-height: 20px; }
    </style>
</head>
<body>
    <h1>Validar Certificado</h1>

    <div class="section">
        <h2>Registrar Certificado</h2>
        <form id="registerForm">
            <input type="text" name="student_name" placeholder="Nome do aluno" required>
            <input type="text" name="institution" placeholder="Instituição" required>
            <input type="text" name="course" placeholder="Curso" required>
            <input type="file" name="file" required>
            <button type="submit">Registrar</button>
        </form>
        <div id="registerResult" class="result"></div>
    </div>

    <div class="section">
        <h2>Verificar Certificado</h2>
        <input type="text" id="hashInput" placeholder="Hash do certificado">
        <button onclick="verifyCertificate()">Verificar</button>
        <div id="verifyResult" class="result"></div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
