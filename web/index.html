<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Certificados Institucionais</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <h1>Certificados Blockchain</h1>
    <p class="subtitle">Instituições de ensino - verifique e gerencie certificados com transparência</p>
  </header>

  <main class="container">
    <section id="loginSection" class="card">
  <h2>Acesso Institucional</h2>
  <form id="loginForm" class="form">
    <div class="form-group">
      <input type="text" id="loginUser" placeholder="Utilizador" required>
    </div>
    <div class="form-group">
      <input type="password" id="loginPass" placeholder="Palavra-passe" required>
    </div>
    <button type="submit" class="btn btn-primary">Entrar</button>
  </form>
  <div id="loginResult" class="result"></div>
  </section>
    <section class="card">
      <h2>Registrar Certificado</h2>
      <form id="registerForm" class="form" enctype="multipart/form-data">
        <div class="form-group">
          <input type="text" name="student_name" placeholder="Nome do aluno" required>
        </div>
        <div class="form-group">
          <input type="text" name="institution" placeholder="Instituição" required>
        </div>
        <div class="form-group">
          <input type="text" name="course" placeholder="Curso" required>
        </div>
        <div class="form-group">
          <input type="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-primary">Registrar</button>
      </form>
      <div id="registerResult" class="result"></div>
    </section>

    <section class="card">
      <h2>Verificar Certificado</h2>
      <div class="form-group">
        <input type="text" id="hashInput" placeholder="Hash do certificado">
      </div>
      <button class="btn btn-primary" onclick="verifyCertificate()">Verificar</button>
      <div id="verifyResult" class="result"></div>
    </section>

    <section class="card">
      <h2>Dashboard de Certificados <span id="countCerts">(0)</span></h2>
      <div class="form-group">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar por nome, curso ou hash...">
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Aluno</th>
            <th>Curso / Instituição</th>
            <th>Data</th>
            <th>Hash</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="dashboardBody"></tbody>
      </table>
    </section>

    <section class="card status-card">
      <small>STATUS DA REDE</small>
      <div class="status-value">Ativa</div>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
